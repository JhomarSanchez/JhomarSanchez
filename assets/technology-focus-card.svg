<svg width="495" height="170" viewBox="0 0 495 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Core technology focus</title>
  <desc id="desc">Static technology focus card listing the main tools used for business software, backend APIs and automation.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="495" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.50" stop-color="#ECFEFF"/>
      <stop offset="1" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="3"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.065"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="495" height="170" rx="18" fill="url(#g)"/>
  <rect width="495" height="170" rx="18" filter="url(#noise)" opacity="0.52"/>
  <rect x="1" y="1" width="493" height="168" rx="17" stroke="#CBD5E1"/>
  <circle cx="452" cy="36" r="58" fill="#8B5CF6" opacity="0.10"/>
