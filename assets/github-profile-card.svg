<svg width="495" height="170" viewBox="0 0 495 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jhomar's GitHub profile snapshot</title>
  <desc id="desc">Static GitHub profile summary card</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="495" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.5" stop-color="#E0F2FE"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 0.07"/></feComponentTransfer></filter>
  </defs>
  <rect width="495" height="170" rx="18" fill="url(#g)"/>
  <rect width="495" height="170" rx="18" filter="url(#noise)" opacity="0.55"/>
  <rect x="1" y="1" width="493" height="168" rx="17" stroke="#CBD5E1"/>
  <text x="26" y="42" font-size="22" font-family="Segoe UI,Inter,Arial" font-weight="700" fill="#0F172A">GitHub profile snapshot</text>
  <text x="26" y="70" font-size="13" font-family="Segoe UI,Inter,Arial" fill="#475569">Public work, client confidentiality and selected repositories</text>
  <g transform="translate(26,96)">
    <rect width="130" height="44" rx="14" fill="#FFFFFF" fill-opacity="0.65" stroke="#CBD5E1"/>
    <text x="18" y="19" font-size="12" font-family="Segoe UI,Inter,Arial" fill="#64748B">Public repos</text>
    <text x="18" y="35" font-size="18" font-family="Segoe UI,Inter,Arial" font-weight="700" fill="#0F172A">4</text>
  </g>
  <g transform="translate(181,96)">
    <rect width="130" height="44" rx="14" fill="#FFFFFF" fill-opacity="0.65" stroke="#CBD5E1"/>
    <text x="18" y="19" font-size="12" font-family="Segoe UI,Inter,Arial" fill="#64748B">Focus</text>
    <text x="18" y="35" font-size="18" font-family="Segoe UI,Inter,Arial" font-weight="700" fill="#0F172A">Full-stack</text>
  </g>
  <g transform="translate(336,96)">
    <rect width="130" height="44" rx="14" fill="#FFFFFF" fill-opacity="0.65" stroke="#CBD5E1"/>
    <text x="18" y="19" font-size="12" font-family="Segoe UI,Inter,Arial" fill="#64748B">Location</text>
    <text x="18" y="35" font-size="18" font-family="Segoe UI,Inter,Arial" font-weight="700" fill="#0F172A">CO</text>
  </g>
</svg>