<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jhomar Sanchez — Junior Full Stack Developer</title>
  <desc id="desc">Light grainy gradient banner for a software developer profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.28" stop-color="#E0F2FE"/>
      <stop offset="0.58" stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <radialGradient id="blobBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(246 78) rotate(43) scale(326 160)">
      <stop stop-color="#93C5FD" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#93C5FD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobViolet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(848 84) rotate(138) scale(330 170)">
      <stop stop-color="#C4B5FD" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#C4B5FD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobPeach" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1011 291) rotate(23) scale(300 145)">
      <stop stop-color="#FDBA74" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#FDBA74" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%" filterUnits="objectBoundingBox">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.11"/>
      </feComponentTransfer>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#64748B" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="36" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="36" fill="url(#blobBlue)"/>
  <rect width="1200" height="360" rx="36" fill="url(#blobViolet)"/>
  <rect width="1200" height="360" rx="36" fill="url(#blobPeach)"/>
  <rect width="1200" height="360" rx="36" filter="url(#grain)" opacity="0.72"/>

  <g opacity="0.75">
    <circle cx="1008" cy="58" r="5" fill="#2563EB"/>
    <circle cx="1036" cy="84" r="4" fill="#7C3AED"/>
    <circle cx="1084" cy="52" r="3" fill="#0EA5E9"/>
    <circle cx="166" cy="287" r="4" fill="#7C3AED"/>
    <circle cx="200" cy="310" r="3" fill="#0EA5E9"/>
    <circle cx="238" cy="284" r="5" fill="#2563EB"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="76" y="62" width="1048" height="236" rx="30" fill="#FFFFFF" fill-opacity="0.58" stroke="#FFFFFF" stroke-opacity="0.72"/>
  </g>

  <text x="116" y="126" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing="0.14em" fill="#2563EB">JHOMAR SÁNCHEZ</text>
  <text x="116" y="180" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="54" font-weight="800" fill="#0F172A">Junior Full Stack Developer</text>
  <text x="118" y="222" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="500" fill="#334155">Node.js · TypeScript · React · Angular · PostgreSQL · MongoDB</text>

  <g transform="translate(116 250)">
    <rect width="174" height="38" rx="19" fill="#EFF6FF" stroke="#BFDBFE"/>
    <text x="22" y="25" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="700" fill="#1D4ED8">Business apps</text>
  </g>
  <g transform="translate(306 250)">
    <rect width="174" height="38" rx="19" fill="#F5F3FF" stroke="#DDD6FE"/>
    <text x="22" y="25" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="700" fill="#6D28D9">REST APIs</text>
  </g>
  <g transform="translate(496 250)">
    <rect width="200" height="38" rx="19" fill="#ECFEFF" stroke="#A5F3FC"/>
    <text x="22" y="25" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="700" fill="#0E7490">Process automation</text>
  </g>
  <g transform="translate(712 250)">
    <rect width="168" height="38" rx="19" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="22" y="25" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="700" fill="#C2410C">Cloud deploys</text>
  </g>

  <path d="M981 165c23-23 60-23 83 0s23 60 0 83-60 23-83 0-23-60 0-83Z" fill="#FFFFFF" fill-opacity="0.48" stroke="#FFFFFF"/>
  <path d="M1014 190l25 17-25 17" stroke="#2563EB" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
