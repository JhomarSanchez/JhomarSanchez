<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jhomar Sanchez - Full Stack Developer</title>
  <desc id="desc">Professional profile banner focused on full-stack development, backend APIs, automation and internal business software.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.32" stop-color="#E0F2FE"/>
      <stop offset="0.68" stop-color="#EEF2FF"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 70) rotate(42) scale(340 160)">
      <stop stop-color="#60A5FA" stop-opacity="0.56"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 80) rotate(135) scale(330 160)">
      <stop stop-color="#A78BFA" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1000 300) rotate(22) scale(310 150)">
      <stop stop-color="#22D3EE" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%" filterUnits="objectBoundingBox">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.09"/>
      </feComponentTransfer>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#64748B" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="36" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="36" fill="url(#blueGlow)"/>
  <rect width="1200" height="360" rx="36" fill="url(#violetGlow)"/>
  <rect width="1200" height="360" rx="36" fill="url(#cyanGlow)"/>
  <rect width="1200" height="360" rx="36" filter="url(#grain)" opacity="0.65"/>

  <g filter="url(#softShadow)">
    <rect x="76" y="58" width="1048" height="244" rx="32" fill="#FFFFFF" fill-opacity="0.64" stroke="#FFFFFF" stroke-opacity="0.78"/>
  </g>

  <g opacity="0.72">
    <circle cx="1008" cy="54" r="5" fill="#2563EB"/>
    <circle cx="1040" cy="82" r="4" fill="#7C3AED"/>
    <circle cx="1088" cy="54" r="3" fill="#0EA5E9"/>
    <circle cx="158" cy="292" r="4" fill="#7C3AED"/>
    <circle cx="200" cy="312" r="3" fill="#0EA5E9"/>
    <circle cx="240" cy="286" r="5" fill="#2563EB"/>
  </g>

  <text x="116" y="122" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="800" letter-spacing="0.12em" fill="#2563EB">JHOMAR SANCHEZ · SYSTEMS ENGINEER</text>
  <text x="116" y="178" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="54" font-weight="850" fill="#0F172A">Full Stack Developer</text>
  <text x="118" y="220" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="600" fill="#334155">Backend APIs · Automation · Internal Business Software</text>
  <text x="118" y="252" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="500" fill="#475569">Node.js · TypeScript · React · Angular · Python · PostgreSQL</text>

  <g transform="translate(116 270)">
    <rect width="152" height="36" rx="18" fill="#EFF6FF" stroke="#BFDBFE"/>
    <text x="20" y="24" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#1D4ED8">Business apps</text>
  </g>
  <g transform="translate(282 270)">
    <rect width="132" height="36" rx="18" fill="#F5F3FF" stroke="#DDD6FE"/>
    <text x="20" y="24" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#6D28D9">REST APIs</text>
  </g>
  <g transform="translate(428 270)">
    <rect width="188" height="36" rx="18" fill="#ECFEFF" stroke="#A5F3FC"/>
    <text x="20" y="24" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#0E7490">Process automation</text>
  </g>
  <g transform="translate(630 270)">
    <rect width="142" height="36" rx="18" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="20" y="24" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#4338CA">Cloud deploys</text>
  </g>

  <g transform="translate(900 118)">
    <rect width="174" height="126" rx="24" fill="#F8FAFC" fill-opacity="0.82" stroke="#CBD5E1"/>
    <circle cx="32" cy="34" r="9" fill="#22C55E"/>
    <circle cx="60" cy="34" r="9" fill="#38BDF8"/>
    <circle cx="88" cy="34" r="9" fill="#8B5CF6"/>
    <rect x="28" y="62" width="118" height="10" rx="5" fill="#CBD5E1"/>
    <rect x="28" y="84" width="86" height="10" rx="5" fill="#93C5FD"/>
    <rect x="28" y="106" width="104" height="10" rx="5" fill="#A5B4FC"/>
  </g>
</svg>
