<svg width="495" height="185" viewBox="0 0 495 185" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ReconGrid</title>
  <desc id="desc">Desktop automation for spreadsheet reconciliation and auditable Excel exports.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="495" y2="185" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.52" stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.07"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="495" height="185" rx="18" fill="url(#g)"/>
  <rect width="495" height="185" rx="18" filter="url(#noise)" opacity="0.50"/>
  <rect x="1" y="1" width="493" height="183" rx="17" stroke="#CBD5E1"/>
  <circle cx="455" cy="38" r="60" fill="#8B5CF6" opacity="0.13"/>
  <circle cx="64" cy="168" r="50" fill="#06B6D4" opacity="0.09"/>

  <rect x="26" y="22" width="168" height="24" rx="12" fill="#F5F3FF" stroke="#DDD6FE"/>
  <text x="40" y="38" font-size="11" font-family="Segoe UI, Inter, Arial" font-weight="800" letter-spacing="0.08em" fill="#6D28D9">DESKTOP PROJECT</text>

  <text x="26" y="76" font-size="27" font-family="Segoe UI, Inter, Arial" font-weight="800" fill="#0F172A">ReconGrid</text>
  <text x="26" y="104" font-size="14" font-family="Segoe UI, Inter, Arial" fill="#334155">Spreadsheet reconciliation and auditable Excel exports.</text>
  <text x="26" y="128" font-size="13" font-family="Segoe UI, Inter, Arial" font-weight="700" fill="#0F172A">Electron · JavaScript/TypeScript · ExcelJS · Layered architecture</text>

  <g transform="translate(26 144)">
    <rect width="78" height="26" rx="13" fill="#8B5CF6" fill-opacity="0.12" stroke="#8B5CF6" stroke-opacity="0.24"/>
    <text x="15" y="17" font-size="12" font-family="Segoe UI, Inter, Arial" font-weight="700" fill="#5B21B6">Desktop</text>
    <rect x="88" width="100" height="26" rx="13" fill="#8B5CF6" fill-opacity="0.12" stroke="#8B5CF6" stroke-opacity="0.24"/>
    <text x="103" y="17" font-size="12" font-family="Segoe UI, Inter, Arial" font-weight="700" fill="#5B21B6">Automation</text>
    <rect x="198" width="72" height="26" rx="13" fill="#8B5CF6" fill-opacity="0.12" stroke="#8B5CF6" stroke-opacity="0.24"/>
    <text x="213" y="17" font-size="12" font-family="Segoe UI, Inter, Arial" font-weight="700" fill="#5B21B6">Excel</text>
  </g>

  <text x="368" y="161" font-size="13" font-family="Segoe UI, Inter, Arial" font-weight="800" fill="#7C3AED">Open repo -&gt;</text>
