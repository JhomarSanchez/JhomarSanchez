<svg width="495" height="185" viewBox="0 0 495 185" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TraceFlow</title>
  <desc id="desc">Traceability, workflow execution and event logging.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="495" y2="185" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.45" stop-color="#E0F2FE"/>
      <stop offset="1" stop-color="#FAE8FF"/>
    </linearGradient>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="495" height="185" rx="18" fill="url(#g)"/>
  <rect width="495" height="185" rx="18" filter="url(#noise)" opacity="0.55"/>
  <rect x="1" y="1" width="493" height="183" rx="17" stroke="#CBD5E1"/>
  <circle cx="453" cy="42" r="58" fill="#0EA5E9" opacity="0.12"/>
  <circle cx="54" cy="163" r="46" fill="#8B5CF6" opacity="0.10"/>
  <text x="26" y="42" font-size="25" font-family="Segoe UI,Inter,Arial" font-weight="700" fill="#0F172A">TraceFlow</text>
  <text x="26" y="72" font-size="14" font-family="Segoe UI,Inter,Arial" fill="#334155">Traceability, workflow execution and event logging.</text>
  <text x="26" y="101" font-size="13" font-family="Segoe UI,Inter,Arial" font-weight="600" fill="#0F172A">Stack: <tspan font-weight="400" fill="#334155">FastAPI · PostgreSQL · SQLAlchemy · Alembic · Docker</tspan></text>
  <rect x="26" y="122" width="96" height="28" rx="14" fill="#0EA5E9" fill-opacity="0.12" stroke="#0EA5E9" stroke-opacity="0.22"/>
    <text x="39" y="141" font-size="12" font-family="Segoe UI,Inter,Arial" fill="#334155">Backend</text>
    <rect x="132" y="122" width="96" height="28" rx="14" fill="#0EA5E9" fill-opacity="0.12" stroke="#0EA5E9" stroke-opacity="0.22"/>
    <text x="145" y="141" font-size="12" font-family="Segoe UI,Inter,Arial" fill="#334155">FastAPI</text>
    <rect x="238" y="122" width="126" height="28" rx="14" fill="#0EA5E9" fill-opacity="0.12" stroke="#0EA5E9" stroke-opacity="0.22"/>
    <text x="251" y="141" font-size="12" font-family="Segoe UI,Inter,Arial" fill="#334155">PostgreSQL</text>
  <text x="26" y="161" font-size="13" font-family="Segoe UI,Inter,Arial" font-weight="700" fill="#0EA5E9">Open repository →</text>
</svg>