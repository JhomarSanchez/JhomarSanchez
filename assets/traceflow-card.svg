<svg width="495" height="185" viewBox="0 0 495 185" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TraceFlow</title>
  <desc id="desc">Event-driven backend with execution tracing and auditability.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="495" y2="185" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.52" stop-color="#E0F2FE"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.07"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="495" height="185" rx="18" fill="url(#g)"/>
  <rect width="495" height="185" rx="18" filter="url(#noise)" opacity="0.50"/>
  <rect x="1" y="1" width="493" height="183" rx="17" stroke="#CBD5E1"/>
  <circle cx="455" cy="38" r="60" fill="#0EA5E9" opacity="0.13"/>
  <circle cx="64" cy="168" r="50" fill="#2563EB" opacity="0.09"/>

  <rect x="26" y="22" width="168" height="24" rx="12" fill="#E0F2FE" stroke="#BAE6FD"/>
  <text x="40" y="38" font-size="11" font-family="Segoe UI, Inter, Arial" font-weight="800" letter-spacing="0.08em" fill="#0369A1">BACKEND PROJECT</text>

  <text x="26" y="76" font-size="27" font-family="Segoe UI, Inter, Arial" font-weight="800" fill="#0F172A">TraceFlow</text>
  <text x="26" y="104" font-size="14" font-family="Segoe UI, Inter, Arial" fill="#334155">Event-driven backend with execution tracing and auditability.</text>
  <text x="26" y="128" font-size="13" font-family="Segoe UI, Inter, Arial" font-weight="700" fill="#0F172A">FastAPI · PostgreSQL · SQLAlchemy · Alembic · Docker</text>

  <g transform="translate(26 144)">
    <rect width="62" height="26" rx="13" fill="#0EA5E9" fill-opacity="0.12" stroke="#0EA5E9" stroke-opacity="0.24"/>
    <text x="15" y="17" font-size="12" font-family="Segoe UI, Inter, Arial" font-weight="700" fill="#075985">JWT</text>
    <rect x="72" width="72" height="26" rx="13" fill="#0EA5E9" fill-opacity="0.12" stroke="#0EA5E9" stroke-opacity="0.24"/>
    <text x="87" y="17" font-size="12" font-family="Segoe UI, Inter, Arial" font-weight="700" fill="#075985">Pytest</text>
    <rect x="154" width="134" height="26" rx="13" fill="#0EA5E9" fill-opacity="0.12" stroke="#0EA5E9" stroke-opacity="0.24"/>
    <text x="169" y="17" font-size="12" font-family="Segoe UI, Inter, Arial" font-weight="700" fill="#075985">Clean boundaries</text>
  </g>

  <text x="368" y="161" font-size="13" font-family="Segoe UI, Inter, Arial" font-weight="800" fill="#0284C7">Open repo -&gt;</text>
